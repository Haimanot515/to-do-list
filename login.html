<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - To Do Master</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* -------------------- LOGIN PAGE STYLES -------------------- */
    .login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(to right, #50e3c2, #4a90e2);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      width: 350px;
      max-width: 100%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .login-container h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .login-container input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    .login-container input:focus {
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .login-container button {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: none;
      background-color: #fff;
      color: #4a90e2;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-container button:hover {
      background-color: #f0f0f0;
    }

    .login-container #error {
      text-align: center;
      margin-top: 10px;
      color: #ff4d4f;
      font-weight: 500;
    }

    /* Responsive tweaks */
    @media(max-width: 400px){
      .login-container {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-container">
      <h2>🔐 Login</h2>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p id="error"></p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
